apiVersion: v1
kind: Service
metadata:
  name: {{ include "sample-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
  annotations:
    # This annotation helps with blue-green deployments
    active-color: {{ include "sample-app.activeColor" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    {{- range .Values.service.additionalPorts }}
    - port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "sample-app.selectorLabels" . | nindent 4 }}
    # Dynamic selector based on active color
    color: {{ include "sample-app.activeColor" . }}
