spec:
  {{- if .Values.workloadIdentity.enabled }}
  serviceAccountName: {{ include "sample-app.serviceAccountName" $ }}
  {{- end }}

  securityContext:
    {{- toYaml .Values.securityContext | nindent 8 }}

  containers:
    - name: {{ .Chart.Name }}
      image: "{{ .Values.image.repository }}:{{ include "sample-app.blueImageTag" . }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}

      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        {{- if .Values.monitoring.enabled }}
        - name: metrics
          containerPort: 9090
          protocol: TCP
        {{- end }}

      # ✅ FIX: merged volumeMounts
      volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: tmp
          mountPath: /tmp

      env:
        - name: APP_COLOR
          value: "blue"
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- if .Values.secrets.enabled }}
        {{- range .Values.secrets.keyvault.secrets }}
        - name: {{ .envName }}
          valueFrom:
            secretKeyRef:
              name: {{ include "sample-app.fullname" $ }}-secrets
              key: {{ .name }}
              optional: false
        {{- end }}
        {{- end }}

      resources:
        {{- toYaml .Values.deployment.blue.resources | nindent 12 }}

      securityContext:
        {{- toYaml .Values.containerSecurityContext | nindent 12 }}

  # ✅ FIX: add BOTH volumes
  volumes:
    - name: nginx-cache
      emptyDir: {}
    - name: tmp
      emptyDir: {}