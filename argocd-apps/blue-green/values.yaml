#==============================================================================
# Helm Values: Sample App - Production Environment
#==============================================================================
# These values configure the sample-app Helm chart for production deployment.
# This file is managed by the CI/CD pipeline and triggers ArgoCD syncs.
#==============================================================================

#------------------------------------------------------------------------------
# Image Configuration
#------------------------------------------------------------------------------
image:
  repository: privateaksacrd.azurecr.io/sample-app
  tag: v1.0.1
  pullPolicy: IfNotPresent

#------------------------------------------------------------------------------
# Deployment Configuration (Blue-Green)
#------------------------------------------------------------------------------
deployment:
  # Active color: which deployment is currently receiving traffic
  # Options: "blue" or "green"
  activeColor: blue
  
  # Blue deployment configuration
  blue:
    enabled: true
    replicas: 3
    imageTag: v1.0.1  # Currently serving version
    
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
    
    podLabels:
      version: "v1.0.1"
    
    nodeSelector:
      workload: app
    
    tolerations: []
    
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - sample-app
              topologyKey: kubernetes.io/hostname

  # Green deployment configuration (standby for new deployments)
  green:
    enabled: false  # Disabled until new deployment
    replicas: 3
    imageTag: ""     # Will be set during deployment
    
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
    
    podLabels:
      version: ""
    
    nodeSelector:
      workload: app
    
    tolerations: []
    
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - sample-app
              topologyKey: kubernetes.io/hostname

#------------------------------------------------------------------------------
# Service Configuration
#------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

#------------------------------------------------------------------------------
# Ingress Configuration
#------------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sample-app.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-app-tls
      hosts:
        - sample-app.company.com

#------------------------------------------------------------------------------
# Azure Workload Identity Configuration
#------------------------------------------------------------------------------
workloadIdentity:
  enabled: true
  serviceAccount:
    name: sample-app-sa
    annotations:
      # Workload identity client ID (from Terraform output)
      azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  
  podLabels:
    azure.workload.identity/use: "true"

#------------------------------------------------------------------------------
# Environment Variables and Secrets
#------------------------------------------------------------------------------
env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: LOG_LEVEL
    value: "Warning"
  - name: ENABLE_METRICS
    value: "true"

secrets:
  enabled: true
  keyvault:
    name: privateaks-kv-prod
    tenantId: "00000000-0000-0000-0000-000000000000"
    secrets:
      - name: database-connection-string
        envName: DATABASE_CONNECTION_STRING
      - name: api-key
        envName: API_KEY
      - name: jwt-signing-key
        envName: JWT_SIGNING_KEY

#------------------------------------------------------------------------------
# Health Checks
#------------------------------------------------------------------------------
healthChecks:
  livenessProbe:
    enabled: true
    path: /health/live
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    path: /health/ready
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  startupProbe:
    enabled: true
    path: /health/startup
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

#------------------------------------------------------------------------------
# Security Context
#------------------------------------------------------------------------------
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

#------------------------------------------------------------------------------
# Monitoring
#------------------------------------------------------------------------------
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics
  
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"

#------------------------------------------------------------------------------
# Horizontal Pod Autoscaler
#------------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

#------------------------------------------------------------------------------
# Pod Disruption Budget
#------------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 2
